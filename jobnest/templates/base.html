<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Jobnest{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --primary: #4f46e5; --primary-dark: #3730a3; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }

    .navbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 1rem 0; }
    .navbar-brand { font-size: 1.5rem; font-weight: 800; color: var(--primary) !important; letter-spacing: -0.5px; }
    .navbar-brand span { color: #f59e0b; }
    .nav-link { color: #475569 !important; font-weight: 500; }
    .nav-link:hover { color: var(--primary) !important; }
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-outline-primary { color: var(--primary); border-color: var(--primary); }
    .btn-outline-primary:hover { background: var(--primary); border-color: var(--primary); color: #fff; }

    .hero { background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); color: #fff; padding: 5rem 0 4rem; }
    .hero h1 { font-size: 3rem; font-weight: 800; line-height: 1.2; }
    .hero p { font-size: 1.2rem; opacity: 0.9; }
    .search-bar { background: #fff; border-radius: 12px; padding: 0.5rem; }
    .search-bar .form-control { border: none; box-shadow: none; font-size: 1rem; }
    .search-bar .btn { border-radius: 8px; padding: 0.6rem 1.5rem; }

    .stat-card { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 1rem 2rem; text-align: center; }
    .stat-card .number { font-size: 2rem; font-weight: 800; }
    .stat-card .label { font-size: 0.85rem; opacity: 0.85; }

    .job-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; transition: all 0.2s; text-decoration: none; color: inherit; display: block; }
    .job-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(79,70,229,0.12); transform: translateY(-2px); color: inherit; }
    .job-card .company { font-size: 0.85rem; color: #64748b; font-weight: 500; }
    .job-card .title { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin: 0.25rem 0 0.5rem; }
    .job-card .meta { font-size: 0.82rem; color: #64748b; }

    .badge-full_time { background: #dbeafe; color: #1d4ed8; }
    .badge-part_time { background: #fef9c3; color: #854d0e; }
    .badge-contract { background: #fce7f3; color: #9d174d; }
    .badge-internship { background: #dcfce7; color: #166534; }
    .badge-remote { background: #f3e8ff; color: #6b21a8; }

    .section-title { font-size: 1.75rem; font-weight: 800; color: #1e293b; }

    footer { background: #1e293b; color: #94a3b8; padding: 3rem 0 1.5rem; margin-top: 4rem; }
    footer .brand { font-size: 1.4rem; font-weight: 800; color: #fff; }
    footer a { color: #94a3b8; text-decoration: none; }
    footer a:hover { color: #fff; }
    footer hr { border-color: #334155; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">Job<span>nest</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto ms-4 gap-1">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/jobs/"><i class="bi bi-briefcase me-1"></i>Browse Jobs</a></li>
      </ul>
      <div class="d-flex gap-2">
        <a href="/accounts/login/" class="btn btn-outline-primary btn-sm px-3">Login</a>
        <a href="/accounts/register/" class="btn btn-primary btn-sm px-3">Sign Up</a>
      </div>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <div class="container">
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="brand mb-2">Job<span style="color:#f59e0b;">nest</span></div>
        <p class="small">Find your dream job or the perfect candidate. Jobnest connects talent with opportunity.</p>
      </div>
      <div class="col-md-2">
        <h6 class="text-white fw-bold mb-3">Jobs</h6>
        <ul class="list-unstyled small">
          <li class="mb-1"><a href="/jobs/">Browse All</a></li>
          <li class="mb-1"><a href="/jobs/?job_type=remote">Remote</a></li>
          <li class="mb-1"><a href="/jobs/?job_type=full_time">Full Time</a></li>
        </ul>
      </div>
      <div class="col-md-2">
        <h6 class="text-white fw-bold mb-3">Account</h6>
        <ul class="list-unstyled small">
          <li class="mb-1"><a href="/accounts/login/">Login</a></li>
          <li class="mb-1"><a href="/accounts/register/">Register</a></li>
        </ul>
      </div>
    </div>
    <hr/>
    <p class="small text-center mb-0">&copy; 2026 Jobnest. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
